name: ClarityHub
options:
  bundleIdPrefix: com.treeman0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ClarityHubCore:
    type: framework
    platform: iOS
    sources:
      - Sources/ClarityHubCore
  ClarityHub:
    type: application
    platform: iOS
    sources:
      - Sources/ClarityHubApp
    dependencies:
      - target: ClarityHubCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.treeman0.ClarityHub
        INFOPLIST_FILE: Sources/ClarityHubApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ClarityHubApp/ClarityHub.entitlements
        GENERATE_INFOPLIST_FILE: NO
  ClarityHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/ClarityHubCoreTests
    dependencies:
      - target: ClarityHubCore
schemes:
  ClarityHub:
    build:
      targets:
        ClarityHub: all
        ClarityHubCore: all
    test:
      targets:
        - ClarityHubTests

