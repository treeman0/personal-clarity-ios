name: ClarityHub
options:
  bundleIdPrefix: com.treeman0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ClarityHubCore:
    type: framework
    platform: iOS
    sources:
      - Sources/ClarityHubCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.treeman0.ClarityHubCore
        GENERATE_INFOPLIST_FILE: YES
  ClarityHub:
    type: application
    platform: iOS
    sources:
      - Sources/ClarityHubApp
    dependencies:
      - target: ClarityHubCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.treeman0.ClarityHub
        INFOPLIST_FILE: Sources/ClarityHubApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ClarityHubApp/ClarityHub.entitlements
        GENERATE_INFOPLIST_FILE: NO
  ClarityHubLocal:
    type: application
    platform: iOS
    sources:
      - path: Sources/ClarityHubApp
        excludes:
          - Info.plist
          - ClarityHub.entitlements
    dependencies:
      - target: ClarityHubCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.treeman0.ClarityHub.Personal
        PRODUCT_NAME: ClarityHubLocal
        PRODUCT_MODULE_NAME: ClarityHub
        INFOPLIST_FILE: Sources/ClarityHubLocal/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ClarityHubLocal/ClarityHubLocal.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) CLARITYHUB_LOCAL"
  ClarityHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/ClarityHubCoreTests
    dependencies:
      - target: ClarityHubCore
  ClarityHubAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/ClarityHubAppTests
    dependencies:
      - target: ClarityHub
    hostApplication: ClarityHub
  ClarityHubLocalAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/ClarityHubAppTests
        excludes:
          - ReleaseMetadataTests.swift
      - Tests/ClarityHubLocalAppTests
    dependencies:
      - target: ClarityHubLocal
    hostApplication: ClarityHubLocal
  ClarityHubUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/ClarityHubUITests
    dependencies:
      - target: ClarityHub
schemes:
  ClarityHub:
    build:
      targets:
        ClarityHub: all
        ClarityHubCore: all
    test:
      targets:
        - ClarityHubTests
        - ClarityHubAppTests
        - ClarityHubUITests
  ClarityHubLocal:
    build:
      targets:
        ClarityHubLocal: all
        ClarityHubCore: all
    test:
      targets:
        - ClarityHubTests
        - ClarityHubLocalAppTests
