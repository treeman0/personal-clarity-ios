name: iOS CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  swift-package:
    name: Swift Package Tests
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Test core package
        run: swift test
      - name: Test V2 acceptance tooling
        run: python3 scripts/test_v2_acceptance_tooling.py

  xcode-build:
    name: Xcode Build
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Verify Cloud and Local configurations
        run: bash scripts/verify-v2-config.sh
      - name: Generate project
        run: xcodegen generate
      - name: Select simulator
        id: destination
        run: echo "value=$(bash scripts/select-ios-destination.sh)" >> "$GITHUB_OUTPUT"
      - name: Build app
        run: xcodebuild build -project ClarityHub.xcodeproj -scheme ClarityHub -destination "${{ steps.destination.outputs.value }}" CODE_SIGNING_ALLOWED=NO
      - name: Build local app
        run: xcodebuild build -project ClarityHub.xcodeproj -scheme ClarityHubLocal -destination "${{ steps.destination.outputs.value }}" CODE_SIGNING_ALLOWED=NO
      - name: Test local app services
        run: xcodebuild test -project ClarityHub.xcodeproj -scheme ClarityHubLocal -destination "${{ steps.destination.outputs.value }}" -only-testing:ClarityHubLocalAppTests CODE_SIGNING_ALLOWED=NO
      - name: Test app scheme
        timeout-minutes: 25
        run: |
          rm -rf TestResults
          xcodebuild test -project ClarityHub.xcodeproj -scheme ClarityHub -destination "${{ steps.destination.outputs.value }}" -resultBundlePath TestResults/ClarityHub.xcresult CODE_SIGNING_ALLOWED=NO
      - name: Upload UI result bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clarityhub-xcresult-${{ github.sha }}
          path: TestResults/ClarityHub.xcresult
          if-no-files-found: ignore
