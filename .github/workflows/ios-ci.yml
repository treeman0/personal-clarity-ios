name: iOS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  swift-package:
    name: Swift Package Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Test core package
        run: swift test

  xcode-build:
    name: Xcode Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Verify release configuration
        run: bash scripts/verify-release-config.sh
      - name: Generate project
        run: xcodegen generate
      - name: Select simulator
        id: destination
        run: echo "value=$(bash scripts/select-ios-destination.sh)" >> "$GITHUB_OUTPUT"
      - name: Build app
        run: xcodebuild build -project ClarityHub.xcodeproj -scheme ClarityHub -destination "${{ steps.destination.outputs.value }}" CODE_SIGNING_ALLOWED=NO
      - name: Test app scheme
        run: xcodebuild test -project ClarityHub.xcodeproj -scheme ClarityHub -destination "${{ steps.destination.outputs.value }}" CODE_SIGNING_ALLOWED=NO
