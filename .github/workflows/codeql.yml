name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "31 8 * * 1"

jobs:
  analyze:
    name: CodeQL Swift
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Generate project
        run: xcodegen generate

      - name: Build for analysis
        timeout-minutes: 40
        run: xcodebuild build -project ClarityHub.xcodeproj -scheme ClarityHub -sdk iphonesimulator -destination "generic/platform=iOS Simulator" CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
