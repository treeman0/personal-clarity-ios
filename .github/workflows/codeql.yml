name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "31 8 * * 1"

jobs:
  analyze:
    name: CodeQL Swift
    runs-on: macos-15
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Generate project
        run: xcodegen generate

      - name: Select simulator
        id: destination
        run: echo "value=$(bash scripts/select-ios-destination.sh)" >> "$GITHUB_OUTPUT"

      - name: Build for analysis
        run: xcodebuild build -project ClarityHub.xcodeproj -scheme ClarityHub -destination "${{ steps.destination.outputs.value }}" CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
